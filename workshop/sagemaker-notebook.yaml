AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket and SageMaker notebook instance for data automation project

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub ${DataBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  NotebookKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SageMaker notebook encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  NotebookExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub ${DataBucket.Arn}/*
        - PolicyName: BedrockDataAutomation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:CreateBlueprint
                  - bedrock:GetBlueprint
                  - bedrock:DeleteBlueprint
                  - bedrock:InvokeBlueprintOptimizationAsync
                  - bedrock:GetBlueprintOptimizationStatus
                  - bedrock:CopyBlueprintStage
                Resource: '*'
        - PolicyName: STSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'

  NotebookLifecycleConfig:
    Type: AWS::SageMaker::NotebookInstanceLifecycleConfig
    Properties:
      OnStart:
        - Content:
            Fn::Base64: !Sub |
              #!/bin/bash
              # Download workshop files from S3 (uploaded by deploy.sh after stack creation).
              # Failures are non-fatal so the notebook starts successfully even if files
              # aren't in S3 yet. deploy.sh restarts the notebook after uploading.
              mkdir -p /home/ec2-user/SageMaker/sample_data/purchase_order

              aws s3 cp "s3://${DataBucket}/workshop/src/" /home/ec2-user/SageMaker/ \
                --recursive --quiet 2>/dev/null || true
              aws s3 cp "s3://${DataBucket}/workshop/samples/" /home/ec2-user/SageMaker/sample_data/ \
                --recursive --quiet 2>/dev/null || true

              chown -R ec2-user:ec2-user /home/ec2-user/SageMaker

              # Expose BDA_BUCKET to Jupyter kernels via IPython startup script
              mkdir -p /home/ec2-user/.ipython/profile_default/startup
              echo "import os; os.environ.setdefault('BDA_BUCKET', '${DataBucket}')" \
                > /home/ec2-user/.ipython/profile_default/startup/00-env.py
              chown -R ec2-user:ec2-user /home/ec2-user/.ipython

  NotebookInstance:
    Type: AWS::SageMaker::NotebookInstance
    Properties:
      InstanceType: ml.t3.medium
      RoleArn: !GetAtt NotebookExecutionRole.Arn
      KmsKeyId: !Ref NotebookKMSKey
      LifecycleConfigName: !GetAtt NotebookLifecycleConfig.NotebookInstanceLifecycleConfigName

Outputs:
  BucketName:
    Value: !Ref DataBucket
  NotebookInstanceName:
    Value: !Ref NotebookInstance
