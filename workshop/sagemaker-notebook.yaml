AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket and SageMaker notebook instance for data automation project

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub ${DataBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  NotebookKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SageMaker notebook encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  NotebookExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub ${DataBucket.Arn}/*
        - PolicyName: BedrockDataAutomation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:CreateBlueprint
                  - bedrock:GetBlueprint
                  - bedrock:DeleteBlueprint
                  - bedrock:InvokeBlueprintOptimizationAsync
                  - bedrock:GetBlueprintOptimizationStatus
                  - bedrock:CopyBlueprintStage
                Resource: '*'
        - PolicyName: STSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'

  NotebookLifecycleConfig:
    Type: AWS::SageMaker::NotebookInstanceLifecycleConfig
    Properties:
      OnStart:
        - Content:
            Fn::Base64: !Sub |
              #!/bin/bash
              set -e
              cd /home/ec2-user/SageMaker
              git clone --depth 1 --filter=blob:none --sparse https://github.com/awscordsen/sample-blueprint-optimizer-for-data-automation.git tmp_repo
              cd tmp_repo
              git sparse-checkout set workshop
              cp -r workshop/src/* /home/ec2-user/SageMaker/
              cp -r workshop/samples/* /home/ec2-user/SageMaker/samples/
              cd ..
              rm -rf tmp_repo
              chown -R ec2-user:ec2-user /home/ec2-user/SageMaker

              echo "export BDA_BUCKET=${DataBucket}" >> /home/ec2-user/.ipython/profile_default/startup/00-startup.py
              initctl restart jupyter-server --no-wait || true

  NotebookInstance:
    Type: AWS::SageMaker::NotebookInstance
    Properties:
      InstanceType: ml.t3.medium
      RoleArn: !GetAtt NotebookExecutionRole.Arn
      KmsKeyId: !Ref NotebookKMSKey
      LifecycleConfigName: !GetAtt NotebookLifecycleConfig.NotebookInstanceLifecycleConfigName

Outputs:
  BucketName:
    Value: !Ref DataBucket
  NotebookInstanceName:
    Value: !Ref NotebookInstance
